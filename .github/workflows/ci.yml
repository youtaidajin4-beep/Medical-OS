name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medical_os
          POSTGRES_PASSWORD: medical_os
          POSTGRES_DB: medical_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medical_os -d medical_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        continue-on-error: true
      - run: pnpm install

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://medical_os:medical_os@localhost:5432/medical_os?schema=public
      - run: pnpm build
